<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #ff5a5a;
            --secondary-color: #4ecdc4;
            --dark-color: #80d29b;
            --light-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #7fc6e4 0%, #9d69d0 100%);
            min-height: 100vh;
            padding: 20px 0;
        }

        .main-container {
            background: rgb(255, 255, 255);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            margin: 20px auto;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: var(--primary-color);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .header p {
            color: #606e79;
            font-size: 1.1rem;
        }

        .search-box {
            position: relative;
            margin-bottom: 40px;
        }

        .search-box input {
            border-radius: 50px;
            padding: 15px 60px 15px 25px;
            border: 2px solid #b9f1de;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(255, 107, 107, 0.25);
        }

        .search-box button {
            position: absolute;
            right: 5px;
            top: 5px;
            border-radius: 50px;
            padding: 10px 30px;
            background: var(--primary-color);
            border: none;
            color: white;
            font-weight: bold;
            transition: all 0.3s;
        }

        .search-box button:hover {
            background: #ef5e5e;
            transform: scale(1.05);
        }

        .suggestions {
            text-align: center;
            margin-bottom: 30px;
        }

        .suggestion-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            margin: 5px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .suggestion-badge:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
            color: var(--primary-color);
        }

        .recipe-content {
            display: none;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .recipe-title {
            color: var(--dark-color);
            font-weight: bold;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 3px solid var(--primary-color);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .section-title {
            color: var(--dark-color);
            font-weight: bold;
            margin: 30px 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        .ingredient-item {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 4px solid var(--secondary-color);
            transition: all 0.3s;
        }

        .ingredient-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .ingredient-measure {
            color: var(--primary-color);
            font-weight: bold;
        }

        .utensil-card {
            background: rgb(243, 244, 243);
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
            color: inherit;
        }

        .utensil-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transform: translateY(-5px);

        .utensil-icon {
            font-size: 2rem;

        }

        .utensil-name {
            font-weight: bold;

        }

        .buy-link {

            text-decoration: none;
        }

        .error-message {

            color: #d32f2f;

        }

        @media (max-width: 768px) {
            .main-container {

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-container">

            <div class="header">
                <h1><i class="fas fa-utensils"></i> 
kitchen Chemistry</h1>
                <p>Search for any recipe and get videos, ingredients, and shopping links!</p>
            </div>

            <!-- Search Box -->
            <div class="search-box">
                <input type="text" class="form-control" id="recipeInput" placeholder="Enter a food name (e.g., biryani, butter chicken, pasta)...">

            </div>

            <!-- Popular Suggestions -->
            <div class="suggestions">
                <div class="suggestion-badge" onclick="searchSuggestion('biryani')">🍚 Biryani</div>

                <div class="suggestion-badge" onclick="searchSuggestion('paneer tikka')">🧀 Paneer Tikka</div>

            <div class="loading" id="loading">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Allow search on Enter key
        document.getElementById('recipeInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchRecipe();
            }
        });

        function searchSuggestion(food) {
            document.getElementById('recipeInput').value = food;
            searchRecipe();
        }

        async function searchRecipe() {
            const foodName = document.getElementById('recipeInput').value.trim();
            
            if (!foodName) {
                showError('Please enter a food name!');
                return;
            }

            // Show loading, hide error and content
            document.getElementById('loading').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('recipeContent').style.display = 'none';

            try {
                // Try TheMealDB API first
                let recipe = await fetchFromMealDB(foodName);
                
                // If not found in MealDB, use YouTube + Generic Recipe Format
                if (!recipe) {
                    recipe = await createGenericRecipe(foodName);
                }

                if (!recipe) {
                    showError(`No recipes found for "${foodName}". Try searching for popular dishes like biryani, butter chicken, pasta, or pizza!`);
                    return;
                }

                displayRecipe(recipe);

            } catch (error) {
                showError('Something went wrong! Please try again.');
                console.error('Error:', error);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        async function fetchFromMealDB(foodName) {
            try {
                const response = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(foodName)}`);
                const data = await response.json();

                if (data.meals && data.meals.length > 0) {
                    const meal = data.meals[0];
                    return {
                        name: meal.strMeal,
                        youtube: meal.strYoutube,
                        instructions: meal.strInstructions,
                        ingredients: extractMealDBIngredients(meal),
                        category: meal.strCategory,
                        image: meal.strMealThumb,
                        source: 'mealdb'
                    };
                }
            } catch (error) {
                console.error('MealDB error:', error);
            }
            return null;
        }

        function extractMealDBIngredients(meal) {
            const ingredients = [];
            for (let i = 1; i <= 20; i++) {
                const ingredient = meal[`strIngredient${i}`];
                const measure = meal[`strMeasure${i}`];
                if (ingredient && ingredient.trim()) {
                    ingredients.push({
                        name: ingredient,
                        measure: measure || ''
                    });
                }
            }
            return ingredients;
        }

        async function createGenericRecipe(foodName) {
            // Create a generic recipe with YouTube search
            const recipes = getCommonRecipes();
            const foundRecipe = recipes.find(r => 
                r.name.toLowerCase().includes(foodName.toLowerCase()) ||
                foodName.toLowerCase().includes(r.name.toLowerCase())
            );

            if (foundRecipe) {
                return {
                    name: foundRecipe.name,
                    youtube: null, // Will show YouTube search button
                    instructions: foundRecipe.instructions,
                    ingredients: foundRecipe.ingredients,
                    category: foundRecipe.category,
                    image: foundRecipe.image,
                    source: 'generic'
                };
            }

            // If not in common recipes, create basic template
            return {
                name: foodName.charAt(0).toUpperCase() + foodName.slice(1),
                youtube: null,
                instructions: `To make ${foodName}:\n1. Gather all ingredients\n2. Follow traditional cooking methods\n3. Cook until done\n4. Serve hot and enjoy!`,
                ingredients: [
                    { name: 'Main ingredient', measure: 'As needed' },
                    { name: 'Spices', measure: 'To taste' },
                    { name: 'Oil', measure: '2-3 tbsp' }
                ],
                category: 'General',
                image: null,
                source: 'generic'
            };
        }

        function displayRecipe(recipe) {
            // Set recipe title
            document.getElementById('recipeTitle').textContent = recipe.name;

            // Display image if available
            displayImage(recipe.image);

            // Display video
            displayVideo(recipe.youtube, recipe.name);

            // Display ingredients
            displayIngredients(recipe.ingredients);

            // Display instructions
            displayInstructions(recipe.instructions);

            // Display utensils
            displayUtensils(recipe);

            // Show recipe content
            document.getElementById('recipeContent').style.display = 'block';
            
            // Scroll to recipe
            document.getElementById('recipeContent').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function displayImage(imageUrl) {
            const container = document.getElementById('recipeImageContainer');
            if (imageUrl) {
                container.innerHTML = `<img src="${imageUrl}" alt="Recipe" class="recipe-image">`;
            } else {
                container.innerHTML = '';
            }
        }

        function displayVideo(youtubeUrl, recipeName) {
            const videoContainer = document.getElementById('videoContainer');
            
            if (youtubeUrl && youtubeUrl.includes('youtube.com/watch')) {
                // Extract video ID from YouTube URL
                const videoId = youtubeUrl.split('v=')[1]?.split('&')[0];
                if (videoId) {
                    videoContainer.innerHTML = `
                        <iframe src="https://www.youtube.com/embed/${videoId}" 
                                allowfullscreen>
                        </iframe>
                    `;
                    return;
                }
            }
            
            // If no direct video, create a search link
            const searchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(recipeName + ' recipe')}`;
            videoContainer.innerHTML = `
                <div class="alert alert-info text-center p-4">
                    <i class="fas fa-video fa-3x mb-3" style="color: var(--primary-color);"></i>
                    <h5>Video Tutorial</h5>
                    <p>Click below to find video recipes on YouTube</p>
                    <a href="${searchUrl}" target="_blank" class="btn btn-primary">
                        <i class="fab fa-youtube"></i> Search YouTube Videos
                    </a>
                </div>
            `;
        }

        function displayIngredients(ingredients) {
            const container = document.getElementById('ingredientsContainer');
            let ingredientsHTML = '';

            ingredients.forEach(ingredient => {
                ingredientsHTML += `
                    <div class="ingredient-item">
                        <i class="fas fa-check-circle" style="color: var(--secondary-color);"></i>
                        <span class="ingredient-measure">${ingredient.measure || ''}</span>
                        <strong>${ingredient.name}</strong>
                    </div>
                `;
            });

            container.innerHTML = ingredientsHTML;
        }

        function displayInstructions(instructions) {
            const container = document.getElementById('instructionsContainer');
            
            if (!instructions) {
                container.innerHTML = '<p>No instructions available.</p>';
                return;
            }

            // Split instructions by period or new line
            const steps = instructions.split(/\r?\n/).filter(step => step.trim().length > 0);
            
            let instructionsHTML = '';
            steps.forEach((step, index) => {
                if (step.trim()) {
                    instructionsHTML += `
                        <div class="instruction-step">
                            <strong>Step ${index + 1}:</strong> ${step.trim()}
                        </div>
                    `;
                }
            });

            container.innerHTML = instructionsHTML;
        }

            const container = document.getElementById('utensilsContainer');
            
            // Common utensils based on recipe analysis
            const utensils = getRecommendedUtensils(recipe);
            
            let utensilsHTML = '';
            utensils.forEach(utensil => {
                const amazonSearchUrl = `https://www.amazon.com/s?k=${encodeURIComponent(utensil.name)}`;
                
                utensilsHTML += `
                    <a href="${amazonSearchUrl}" target="_blank" class="utensil-card">
                        <div class="utensil-icon">
                            <i class="${utensil.icon}"></i>
                        </div>
                        <div class="utensil-name">${utensil.name}</div>
                        <div class="buy-link">
                            <i class="fas fa-shopping-cart"></i> Buy on Amazon →
                        </div>
                    </a>
                `;
            });

            container.innerHTML = utensilsHTML;
        }

        function getRecommendedUtensils(recipe) {
            const utensils = [];
            const instructions = (recipe.instructions || '').toLowerCase();
            const category = (recipe.category || '').toLowerCase();
            const name = (recipe.name || '').toLowerCase();

            // Common utensils mapping
            const utensilsList = [
                { name: 'Pressure Cooker', icon: 'fas fa-temperature-high', keywords: ['pressure', 'cooker', 'biryani', 'dal', 'chickpeas', 'mutton'] },
                { name: 'Kadai/Wok', icon: 'fas fa-fire', keywords: ['kadai', 'wok', 'curry', 'masala', 'tikka', 'fry'] },
                { name: 'Mixing Bowl', icon: 'fas fa-bowl-food', keywords: ['mix', 'bowl', 'combine', 'whisk', 'marinate'] },
                { name: 'Frying Pan', icon: 'fas fa-fire-burner', keywords: ['fry', 'pan', 'sauté', 'cook', 'sear'] },
                { name: 'Baking Tray', icon: 'fas fa-cookie', keywords: ['bake', 'oven', 'tray', 'sheet', 'roast', 'grill'] },
                { name: 'Pot', icon: 'fas fa-pot-food', keywords: ['pot', 'boil', 'simmer', 'stew'] },
                { name: 'Knife Set', icon: 'fas fa-utensils', keywords: ['chop', 'cut', 'slice', 'dice', 'mince'] },
                { name: 'Measuring Cups', icon: 'fas fa-fill-drip', keywords: ['cup', 'measure', 'tbsp', 'tsp', 'tablespoon'] },
                { name: 'Whisk', icon: 'fas fa-whistle', keywords: ['whisk', 'beat', 'mix'] },
                { name: 'Spatula', icon: 'fas fa-utensil-spoon', keywords: ['flip', 'stir', 'spatula'] },
                { name: 'Tawa/Griddle', icon: 'fas fa-circle', keywords: ['tawa', 'griddle', 'roti', 'paratha', 'dosa'] },
                { name: 'Grater', icon: 'fas fa-grip-lines', keywords: ['grate', 'shred'] }
            ];

            // Check which utensils are mentioned
            utensilsList.forEach(utensil => {
                const found = utensil.keywords.some(keyword => 
                    instructions.includes(keyword) || name.includes(keyword)
                );
                if (found && utensils.length < 6) {
                    utensils.push(utensil);
                }
            });

            // Add default utensils if none found
            if (utensils.length === 0) {
                utensils.push(
                    { name: 'Mixing Bowl', icon: 'fas fa-bowl-food' },
                    { name: 'Knife Set', icon: 'fas fa-utensils' },
                    { name: 'Measuring Cups', icon: 'fas fa-fill-drip' }
                );
            }

            return utensils;
        }

        function showError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('recipeContent').style.display = 'none';
        }
    </script>
